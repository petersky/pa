{% if card %}
<div class="card-detail">
  <div class="panel-header">
    <h2>Edit card</h2>
    <button type="button" class="ghost"
            hx-get="/partials/card-detail-empty"
            hx-target="#card-detail"
            hx-swap="innerHTML">Close</button>
  </div>
  <form class="stack"
        hx-post="/partials/cards/{{ card.id }}?realm={{ card.realm_id }}"
        hx-target:inherited="#card-detail"
        hx-swap:inherited="innerHTML">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <label>
      Title
      <input type="text" name="title" value="{{ card.title }}" required>
    </label>
    <label>
      Body
      <textarea name="body" rows="4">{{ card.body }}</textarea>
    </label>
    <label>
      Lane
      <select name="lane">
        {% for lane in lanes %}
        <option value="{{ lane.value }}" {% if card.lane == lane %}selected{% endif %}>
          {{ lane.value | capitalize }}
        </option>
        {% endfor %}
      </select>
    </label>
    <div class="form-actions">
      <button type="submit">Save</button>
      <button type="button" class="ghost danger"
              hx-delete="/partials/cards/{{ card.id }}?realm={{ card.realm_id }}"
              hx-confirm="Delete this card?">Delete</button>
    </div>
  </form>
  <p class="muted">Kind: {{ card.kind.value }} · ID: {{ card.id[:8] }}…</p>
</div>
{% else %}
<p class="empty">Card not found.</p>
{% endif %}
