{% if knowledge %}
<ul class="knowledge-list">
  {% for entry in knowledge %}
  <li>
    <p>{{ entry.summary }}</p>
    <small>{{ entry.source }} · {{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="empty">No knowledge captured yet.</p>
{% endif %}
