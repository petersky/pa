name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Track to update (release, beta, alpha, dev)"
        required: true
        default: release
      ref:
        description: "Git ref (tag or branch)"
        required: true

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Build wheel
        run: uv build

      - name: Determine prerelease
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          LOWER="${TAG,,}"
          if [[ "${LOWER}" == *"-alpha."* || "${LOWER}" == *"-beta."* || "${LOWER}" == *"-rc."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: dist/*
          generate_release_notes: true

  update-channels:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update channels.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          LOWER="${TAG,,}"
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["TAG"]
          lower = tag.lower()
          path = Path("channels.json")
          data = json.loads(path.read_text()) if path.exists() else {}

          if "-beta." in lower:
              data["beta"] = tag
          elif "-alpha." in lower:
              data["alpha"] = tag
          elif "-rc." in lower:
              data["beta"] = tag
          else:
              data["release"] = tag

          path.write_text(json.dumps(data, indent=2) + "\n")
          print(json.dumps(data, indent=2))
          PY
        env:
          TAG: ${{ github.ref_name }}

      - name: Commit channels.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git diff --staged --quiet || git commit -m "chore: update channels.json for ${{ github.ref_name }}"
          git push

  update-channels-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update channels.json
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          track = os.environ["TRACK"]
          ref = os.environ["REF"]
          path = Path("channels.json")
          data = json.loads(path.read_text()) if path.exists() else {}
          data[track] = ref
          path.write_text(json.dumps(data, indent=2) + "\n")
          print(json.dumps(data, indent=2))
          PY
        env:
          TRACK: ${{ github.event.inputs.track }}
          REF: ${{ github.event.inputs.ref }}

      - name: Commit channels.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json
          git diff --staged --quiet || git commit -m "chore: set channels.json ${{ github.event.inputs.track }}=${{ github.event.inputs.ref }}"
          git push
